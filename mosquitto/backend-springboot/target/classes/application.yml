server:
  port: 8080

spring:
  application:
    name: flota-monitoring-service
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  datasource:
    url: jdbc:h2:mem:fleetdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  queues:
    gps: cola.gps.telemetria
    temperature-alerts: cola.alertas.temperatura
    fuel-alerts: cola.combustible.nivel
    notifications: cola.notificaciones
